name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  id-token: write

env:
  NODE_VERSION: '20'

jobs:
  # Job 1: Validate Release
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      version: ${{ steps.get-version.outputs.version }}
      is-prerelease: ${{ steps.check-prerelease.outputs.is-prerelease }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Check if pre-release
        id: check-prerelease
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if [[ $VERSION =~ (alpha|beta|rc) ]]; then
            echo "is-prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is-prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Validate version format
        run: |
          VERSION="${{ steps.get-version.outputs.version }}"
          if ! [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi

  # Job 2: Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run security audit
        run: npm audit --audit-level=high

      - name: Run Trivy scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          skip-dirs: 'tools/mocks'
          skip-files: 'libs/core/use-cases/proxy/guardrails/pii-redactor.ts'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # Job 3: Build Release Artifacts
    build:
      name: Build Release Artifacts
      runs-on: ${{ matrix.os }}
      timeout-minutes: 15
      needs: [validate, security-audit]
      defaults:
        run:
          shell: bash

      strategy:
        matrix:
          os: [ubuntu-latest, windows-latest, macos-latest]

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: ${{ env.NODE_VERSION }}
            cache: 'npm'

        - name: Install dependencies
          run: npm ci --prefer-offline --no-audit

        - name: Build project
          run: npm run build

        - name: Package artifacts
          run: |
            mkdir -p artifacts
            cp dist/* artifacts/ 2>/dev/null || true
            cp package.json artifacts/
            cp README.md artifacts/ 2>/dev/null || true
            cp LICENSE artifacts/ 2>/dev/null || true

        - name: Create tarball
          run: |
            cd artifacts
            tar -czf ../mcp-verify-${{ needs.validate.outputs.version }}-${{ runner.os }}.tar.gz *

        - name: Upload artifacts
          uses: actions/upload-artifact@v4
          with:
            name: release-${{ runner.os }}
            path: mcp-verify-${{ needs.validate.outputs.version }}-${{ runner.os }}.tar.gz
            retention-days: 7

  # Job 4: Generate SBOM (Software Bill of Materials)
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Generate SBOM
        run: |
          npx @cyclonedx/cyclonedx-npm --output-file sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # Job 5: Create GitHub Release
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, security-audit, build, sbom]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog from git commits
          PREVIOUS_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            CHANGELOG=$(git log $PREVIOUS_TAG..HEAD --pretty=format:"- %s (%h)" --no-merges)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ needs.validate.outputs.version }}
          name: Release v${{ needs.validate.outputs.version }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.changelog }}

            ## Security

            - ✅ Security audit passed
            - ✅ No high/critical vulnerabilities
            - ✅ SBOM included

            ## Artifacts

            Download the appropriate archive for your platform:
            - Linux: `mcp-verify-${{ needs.validate.outputs.version }}-Linux.tar.gz`
            - Windows: `mcp-verify-${{ needs.validate.outputs.version }}-Windows.tar.gz`
            - macOS: `mcp-verify-${{ needs.validate.outputs.version }}-macOS.tar.gz`

            ## Verification

            All artifacts are signed and can be verified using the provided checksums.

            ## Installation

            ```bash
            npm install -g mcp-verify@${{ needs.validate.outputs.version }}
            ```

            ---

            🤖 Generated with [GitHub Actions](https://github.com/features/actions)
          prerelease: ${{ needs.validate.outputs.is-prerelease }}
          draft: false
          files: |
            release-artifacts/**/*.tar.gz
            release-artifacts/**/sbom.json
          generate_release_notes: true

  # Job 6: Publish to npm
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [release]
    if: needs.validate.outputs.is-prerelease == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build project
        run: npm run build

      - name: Publish Main Package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish MCP Server Package
        run: npm publish -w apps/mcp-server --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Job 7: Publish to VS Code Marketplace
  publish-vscode:
    name: Publish to VS Code
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [release]
    if: needs.validate.outputs.is-prerelease == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build Extension Bundle
        run: |
          cd apps/vscode-extension
          node build.js

      - name: Publish to Marketplace
        run: |
          cd apps/vscode-extension
          npx @vscode/vsce publish -p ${{ secrets.VSCE_PAT }} --no-dependencies

  # Job 7: Create Docker Image (if applicable)
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, release]
    if: needs.validate.outputs.is-prerelease == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate.outputs.version }}
            type=semver,pattern={{major}},value=${{ needs.validate.outputs.version }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # Job 8: Notify on Success
  notify-success:
    name: Notify Release Success
    runs-on: ubuntu-latest
    needs: [release, publish-npm]
    if: success()

    steps:
      - name: Send notification
        run: |
          echo "✅ Release v${{ needs.validate.outputs.version }} completed successfully!"
          # Add Slack/Discord notification here if needed

  # Job 9: Rollback on Failure
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: [release, publish-npm]
    if: failure()

    steps:
      - name: Trigger rollback
        run: |
          echo "❌ Release failed. Manual intervention required."
          # Add rollback logic here if needed
