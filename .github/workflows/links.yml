name: Check Documentation Links

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight UTC
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: read
  issues: write  # To create issues for broken links

jobs:
  linkchecker:
    name: Check Links in Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Link Checker
        uses: lycheeverse/lychee-action@v1
        with:
          # Check all markdown files
          args: >-
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --exclude-loopback
            --exclude-private
            --exclude-mail
            '**/*.md'
          fail: true
          jobSummary: true
          format: markdown

      - name: Create Issue for broken links
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = '🔗 Broken links detected in documentation';
            const body = `Broken links were found during the automated link check.

            **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Please review and fix the broken links.`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'documentation,bug'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['documentation', 'bug']
              });
            }
